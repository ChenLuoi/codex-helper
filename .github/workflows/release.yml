name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.12.0"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          package_version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          tag_version="${GITHUB_REF_NAME#v}"

          if [ "$package_version" != "$tag_version" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package version ${package_version}"
            exit 1
          fi

      - name: Check release metadata
        run: node scripts/check-release.mjs

      - name: Cargo package dry-run
        run: cargo package --locked --registry crates-io

      - name: Main npm pack dry-run
        run: npm pack --dry-run

  pack-main:
    name: Pack main npm and crate artifacts
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.12.0"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check release metadata
        run: node scripts/check-release.mjs

      - name: Pack main npm package
        run: |
          mkdir -p dist/release/npm-tarballs
          npm pack --pack-destination dist/release/npm-tarballs

      - name: Package crate archive
        run: |
          mkdir -p dist/release/cargo
          cargo package --locked --registry crates-io
          cp target/package/codex-ops-*.crate dist/release/cargo/

      - name: Upload main npm package
        uses: actions/upload-artifact@v4
        with:
          name: npm-main
          path: dist/release/npm-tarballs/*.tgz
          if-no-files-found: error

      - name: Upload crate archive
        uses: actions/upload-artifact@v4
        with:
          name: crate-package
          path: dist/release/cargo/*.crate
          if-no-files-found: error

  build-artifacts:
    name: Build ${{ matrix.platform_target }}
    needs: validate
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_target: linux-x64-gnu
            rust_target: x86_64-unknown-linux-gnu
            npm_package: "@codexops/linux-x64-gnu"
            binary: codex-ops
            run_binary: true
            static_binary: false
            os: ubuntu-22.04
          - platform_target: linux-arm64-gnu
            rust_target: aarch64-unknown-linux-gnu
            npm_package: "@codexops/linux-arm64-gnu"
            binary: codex-ops
            run_binary: true
            static_binary: false
            os: ubuntu-24.04-arm
          - platform_target: linux-x64-musl
            rust_target: x86_64-unknown-linux-musl
            npm_package: "@codexops/linux-x64-musl"
            binary: codex-ops
            run_binary: true
            static_binary: true
            os: ubuntu-latest
          - platform_target: linux-arm64-musl
            rust_target: aarch64-unknown-linux-musl
            npm_package: "@codexops/linux-arm64-musl"
            binary: codex-ops
            run_binary: false
            static_binary: true
            os: ubuntu-24.04-arm
          - platform_target: darwin-x64
            rust_target: x86_64-apple-darwin
            npm_package: "@codexops/darwin-x64"
            binary: codex-ops
            run_binary: true
            os: macos-15-intel
          - platform_target: darwin-arm64
            rust_target: aarch64-apple-darwin
            npm_package: "@codexops/darwin-arm64"
            binary: codex-ops
            run_binary: false
            os: macos-15
          - platform_target: win32-x64-msvc
            rust_target: x86_64-pc-windows-msvc
            npm_package: "@codexops/win32-x64-msvc"
            binary: codex-ops.exe
            run_binary: true
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.12.0"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Build target
        run: cargo build --release --locked --target ${{ matrix.rust_target }}

      - name: Check native binary version
        if: matrix.run_binary
        run: node scripts/check-release.mjs --binary target/${{ matrix.rust_target }}/release/${{ matrix.binary }}

      - name: Check Linux binary is static
        if: matrix.static_binary
        shell: bash
        run: |
          binary="target/${{ matrix.rust_target }}/release/${{ matrix.binary }}"
          file "$binary"

          ldd_output="$(ldd "$binary" 2>&1 || true)"
          echo "$ldd_output"
          if ! grep -Eq "not a dynamic executable|statically linked" <<<"$ldd_output"; then
            echo "::error::Linux release binary is dynamically linked"
            exit 1
          fi

          if readelf -d "$binary" 2>/dev/null | grep -q "(NEEDED)"; then
            echo "::error::Linux release binary has dynamic library dependencies"
            readelf -d "$binary"
            exit 1
          fi

      - name: Stage artifact and npm platform package
        run: >
          node scripts/package-release-artifact.mjs
          --target ${{ matrix.platform_target }}
          --rust-target ${{ matrix.rust_target }}
          --output-dir dist/release

      - name: Pack npm platform package
        run: npm pack dist/release/npm/${{ matrix.npm_package }} --pack-destination dist/release/npm-tarballs

      - name: Upload binary release archive
        uses: actions/upload-artifact@v4
        with:
          name: codex-ops-${{ matrix.platform_target }}
          path: dist/release/binary-tarballs/*.tar.gz
          if-no-files-found: error

      - name: Upload npm platform package
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.platform_target }}
          path: dist/release/npm-tarballs/*.tgz
          if-no-files-found: error

  assemble-release-assets:
    name: Assemble GitHub Release assets
    needs:
      - build-artifacts
      - pack-main
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.12.0"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/downloaded

      - name: Assemble release assets
        run: node scripts/assemble-release-assets.mjs --input-dir dist/downloaded --output-dir dist/release-assets

      - name: Verify release asset checksums
        shell: bash
        run: |
          cd dist/release-assets
          sha256sum -c SHA256SUMS

      - name: Upload release asset bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: dist/release-assets/*
          if-no-files-found: error

  create-github-release:
    name: Create draft GitHub Release
    needs: assemble-release-assets
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist/release-assets

      - name: Create or update draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"

          if gh release view "$tag" >/dev/null 2>&1; then
            is_draft="$(gh release view "$tag" --json isDraft --jq .isDraft)"
            if [ "$is_draft" != "true" ]; then
              echo "::error::Release ${tag} already exists and is not a draft"
              exit 1
            fi
            echo "Draft release ${tag} already exists; uploading assets to it."
          else
            gh release create "$tag" --draft --title "$tag" --notes "Release $tag"
          fi

          gh release upload "$tag" dist/release-assets/* --clobber

  publish-registries:
    name: Publish crate and npm packages
    needs: create-github-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download npm artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: dist/npm-artifacts

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist/release-assets

      - name: Verify release asset checksums
        shell: bash
        run: |
          cd dist/release-assets
          sha256sum -c SHA256SUMS

      - name: Publish crate
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          error_log="${RUNNER_TEMP}/cargo-publish.err"
          set +e
          cargo publish --locked --registry crates-io 2>"$error_log"
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if grep -Eiq "already (uploaded|exists)|has already been uploaded|crate version .* already exists" "$error_log"; then
            cat "$error_log"
            echo "crate version already exists on crates.io; skipping"
            exit 0
          fi

          cat "$error_log"
          exit "$status"

      - name: Publish npm artifacts
        run: node scripts/publish-npm-artifacts.mjs --input-dir dist/npm-artifacts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

  publish-github-release:
    name: Publish GitHub Release
    needs: publish-registries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"
          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --jq .id)"
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" -f draft=false -f make_latest=true
